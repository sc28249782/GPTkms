name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependency
        run: python -m pip install PyYAML

      - name: Compile Python files
        run: python -m py_compile src/gptkms_mcp/server.py src/gptkms_mcp/kms_store.py scripts/smoke_test.py scripts/validate_repo.py

      - name: Run smoke test
        run: python scripts/smoke_test.py

      - name: Validate repository metadata
        run: python scripts/validate_repo.py
